name: 功能建议
description: 提出新功能或改进建议
title: "[Feature] "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        欢迎提出想法！请先说明使用场景，方便评估优先级。

  - type: textarea
    id: problem
    attributes:
      label: 想解决什么问题？
      placeholder: 例如：希望在日历页一键查看当月所有云朵
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: 期望的方案
      placeholder: 描述你期望的交互或实现方式
    validations:
      required: true

  - type: dropdown
    id: module
    attributes:
      label: 涉及模块
      options:
        - 微信小程序
        - Laravel API
        - 管理后台
        - 全栈
    validations:
      required: true

  - type: checkboxes
    id: contribution
    attributes:
      label: 参与意愿
      options:
        - label: 我愿意提交 Pull Request 实现该功能
          required: false
